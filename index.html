<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maja, Nao</title>
    <link rel="stylesheet" href="index.css" />
    <script type="module" src="index.js"></script>
  </head>
  <body>
    <header>
      <div class="logo">🌍 AtlasTravel</div>
      <nav class="main-nav">
        <ul>
          <li><a href="#">Kezdőlap</a></li>
          <li><a href="#">Utazások</a></li>
          <li><a href="#">Foglalásaim</a></li>
          <li><a href="#">Kedvencek</a></li>
          <li><a href="#">Kapcsolat</a></li>
        </ul>
      </nav>
      <div class="header-icons">
        <span>👤</span>
        <span>♡</span>
      </div>
    </header>
    <main>
      <section class="page-header">
        <h1>Utazások</h1>
        <p>Fedezd fel a legszebb úti célokat és tervezd meg következő kalandodat!</p>
      </section>
      <section class="search-bar">
        <input id="nevKereso" type="text" placeholder="Hova szeretnél utazni?" />
        <input id="datumKereso" type="date" />
        <select id="letszamKereso">
          <option value="">Hány fő?</option>
          <option value="2">2 fő</option>
          <option value="3">3 fő</option>
          <option value="4">4 fő</option>
          <option value="5">5 fő</option>
          <option value="6">6 fő</option>
          <option value="7">7 fő</option>
          <option value="8">8 fő</option>
      </select>
        <button id="keresesGomb">Keresés</button>
      </section>
      <section class="rendezes">
        <button id="alap">Alapértelmezett</button>
        <button id="ar_no">Olcsótól drágáig</button>
        <button id="ar_csokk">Drágától olcsóig</button>
      </section>
      <section id="utazasok"></section>
      <section id="foglalasok"></section>
    </main>
    <footer>
      <div class="info-bar">
        <div class="info-item">
          🔒<div><strong>Biztonságos foglalás</strong><span>Adatvédelem</span></div>
        </div>
        <div class="info-item">
          🎧<div><strong>Ügyfélszolgálat</strong><span>0-24</span></div>
        </div>
        <div class="info-item">
          ✅<div><strong>Legjobb árak</strong></div>
        </div>
        <div class="info-item">
          💳<div><strong>Rugalmas fizetés</strong></div>
        </div>
      </div>
    </footer>
    <div id="overlay" class="overlay"></div>
    <div id="modal" class="modal">
      <button id="modal-close">✖</button>
      <h2 id="modal-cim"></h2>
      <p id="modal-leiras"></p>
    </div>
  </body>
</html>
